{% extends "base.html" %}

{% block content %}
<h1>Viagens</h1>

<a href="{% url 'viagem_create' %}">Nova viagem</a>

<ul>
  {% for v in object_list %}
    <li>
      <a href="{% url 'viagem_detail' v.id %}">
        Viagem {{ v.id }} - {{ v.loja }}
      </a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
