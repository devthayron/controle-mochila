{% extends "base.html" %}

{% block title %}Nova Mochila — TI Armazém Paraíba{% endblock %}
{% block nav_mochilas %}active{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-header-left">
        <h1>Nova Mochila</h1>
        <p>Crie um kit de equipamentos</p>
    </div>
</div>

<div class="card card-form">

    <form method="post" class="form-layout">
        {% csrf_token %}

        <!-- NOME -->
        <div class="form-group">
            <label for="{{ form.nome.id_for_label }}">Nome da mochila</label>
            {{ form.nome }}
        </div>

        <!-- ITENS -->
        <div class="form-group">
            <label for="{{ form.itens.id_for_label }}">Itens</label>
            {{ form.itens }}
        </div>

        <!-- AÇÕES -->
        <div class="form-actions">
            <a href="{% url 'mochila_list' %}" class="btn btn-ghost">Cancelar</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save"></i> Salvar
            </button>
        </div>

    </form>

</div>

{% endblock %}
